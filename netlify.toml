[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Growth OS scheduled jobs.
#
# NOTE: a function declaring a `schedule` is NOT invocable over HTTP - Netlify
# returns 404. That is why each job has a dedicated *-cron function and the
# console's manual equivalents (growth-compact, growth-analyze) are separate,
# admin-gated, and deliberately unscheduled. Adding a schedule to those would
# silently 404 the console buttons. See _growthRunAnalysis.mjs.

# Rolls finished days of one-key-per-event blobs into one blob per day, so reads
# stay cheap as history accumulates. 03:15 UTC - after any plausible day
# boundary, and off-peak. Only ever touches days before today, so it cannot race
# a live write.
[functions."growth-compact-cron"]
  schedule = "15 3 * * *"

# The AI executive team. WEEKLY (Monday 06:00 UTC), deliberately not daily: at
# this platform's scale a daily brief would be narrating noise - day-over-day
# movement of 0-3 signups carries no information - and a system that cries wolf
# daily gets ignored within a fortnight. Weekly also keeps the whole AI layer to
# ~4 runs/month, well inside the cap enforced in _aiBudget.mjs.
[functions."growth-analyze-cron"]
  schedule = "0 6 * * 1"

# Security headers (P1-3). Applied to every served path. These are all
# zero-breakage for a same-origin SPA:
#   - HSTS forces HTTPS for a year (Netlify already serves HTTPS-only).
#   - X-Frame-Options + CSP frame-ancestors 'self' stop clickjacking. Note the
#     embeddable "Verified by KHAN Trust" badge is an <img>/SVG, NOT an iframe,
#     so framing restrictions do not affect it.
#   - nosniff blocks MIME-confusion; Referrer-Policy trims referrer leakage;
#     Permissions-Policy disables device APIs the app never uses.
# A full resource-restricting CSP (script-src/connect-src/img-src covering GA,
# Stripe, CoinGecko widgets, and every data provider) is deliberately NOT set
# here yet - a wrong value silently breaks fetches and is being introduced as a
# separately verified step. frame-ancestors alone cannot break app resources.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "frame-ancestors 'self'"

# The private Growth OS console. Served from its own Vite entry (admin.html),
# so none of its code ships in the user bundle.
#
# Path-specific rewrite, consistent with every other redirect here - there is
# still no catch-all - so the public hash-routed SPA at "/" is untouched.
[[redirects]]
  from = "/console"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/console/*"
  to = "/admin.html"
  status = 200

# Defence in depth for the console surface. The passcode gate is the actual
# access control - these headers stop the console from being INDEXED or
# CACHED, which is a different problem: without them a crawler that ever sees
# /console can list it in search results, advertising that the system exists.
# That is the requirement these enforce ("users must never know this exists"),
# not authorisation.
[[headers]]
  for = "/console"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Cache-Control = "no-store"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Cache-Control = "no-store"

# Immutable caching for build output (Phase 3 perf). Everything under /assets/
# is content-hashed by Vite (e.g. react-vendor-Cw1fZvOf.js) - a changed file
# always gets a new name - so it is safe to cache forever. Without this the
# hashed chunks were served max-age=0,must-revalidate, forcing a revalidation
# request for every chunk on every visit and defeating the vendor-split caching.
# index.html itself is NOT matched here, so it keeps revalidating and always
# points at the current hashed assets after a deploy.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SEO surface (Direction 2). These are ADDITIVE, path-specific rewrites only -
# there is deliberately NO catch-all "/*" redirect, so the existing hash-routed
# SPA (served as the static index.html at "/") is completely untouched. Status
# 200 = transparent rewrite, so the clean /token/<contract> and /sitemap.xml
# URLs are what users and crawlers see.
[[redirects]]
  from = "/token/:contract"
  to = "/.netlify/functions/token-page?contract=:contract"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Verification-as-Network (Direction 4): embeddable "Verified by KHAN Trust"
# badge SVG. Additive, path-specific - no catch-all.
[[redirects]]
  from = "/badge/:projectId"
  to = "/.netlify/functions/verify-badge?projectId=:projectId"
  status = 200
